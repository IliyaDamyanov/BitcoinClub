version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=bitcoinclubdb;Username=bitcoinclub;Password=${POSTGRES_PASSWORD:-changeme}
      - LNbits__BaseUrl=${LNBITS_BASE_URL:-https://legend.lnbits.com}
      - LNbits__ApiKey=${LNBITS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bitcoinclubdb
      POSTGRES_USER: bitcoinclub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcoinclub -d bitcoinclubdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
